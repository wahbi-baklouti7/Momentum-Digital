<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <!-- Momentum Chevron Shape -->
    <path id="momentum-chevron" d="M0,0 L30,0 L40,20 L30,40 L0,40 L10,20 Z" />
  </defs>
  
  <g transform="translate(12, 30)">
    <!-- Motion Pulse Dots -->
    <circle cx="-4" cy="12" r="2.5" fill="#0F172A" opacity="0.4" />
    <circle cx="4" cy="20" r="3" fill="#0F172A" opacity="0.9" />
    <circle cx="-4" cy="28" r="2.5" fill="#0F172A" opacity="0.4" />
    
    <!-- Three Chevrons with brand colors -->
    <!-- Navy -->
    <use href="#momentum-chevron" x="5" y="0" fill="#0F172A" />
    <!-- Purple -->
    <use href="#momentum-chevron" x="22" y="0" fill="#7C3AED" />
    <!-- Cyan -->
    <use href="#momentum-chevron" x="39" y="0" fill="#06B6D4" />
  </g>
</svg>
